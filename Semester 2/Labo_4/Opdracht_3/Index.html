<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Formwaarden</title>

</head>

<body>

<h2>Formwaarden</h2>

<form>

    <label>
        Is roker
        <input type="checkbox" id="roker">
    </label>

    <br><br>

    Moedertaal:
    <label>
        <input type="radio" name="taal" value="nl"> Nederlands
    </label>

    <label>
        <input type="radio" name="taal" value="fr"> Frans
    </label>

    <label>
        <input type="radio" name="taal" value="en"> Engels
    </label>

    <br><br>

    <label for="buurland">Favoriete buurland</label>
    <select id="buurland">
        <option value="nl">Nederland</option>
        <option value="fr">Frankrijk</option>
        <option value="de">Duitsland</option>
    </select>

    <br><br>

    <label for="bestelling">Bestelling</label>
    <select id="bestelling" multiple>
        <option>aardappelen</option>
        <option>brood</option>
        <option>melk</option>
        <option>biefstuk</option>
        <option>chips</option>
        <option>krant</option>
    </select>

    <br><br>

    <button type="button" onclick="toonResultaat()">Toon resultaat</button>

</form>
<script src="Scripts/Js.js" defer></script>

</body>

</html>
